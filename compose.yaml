services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${PORT:-9000}
      REMODEX_PUSH_STATE_FILE: ${REMODEX_PUSH_STATE_FILE:-/data/push-state.json}
      REMODEX_ENABLE_PUSH_SERVICE: ${REMODEX_ENABLE_PUSH_SERVICE:-false}
      REMODEX_TRUST_PROXY: ${REMODEX_TRUST_PROXY:-false}
    ports:
      - "${REMODEX_RELAY_BIND_HOST:-127.0.0.1}:${PORT:-9000}:${PORT:-9000}"
    expose:
      - "${PORT:-9000}"
    volumes:
      - relay-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:9000/health"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  relay-data:
